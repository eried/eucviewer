<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Trip Inspector &mdash; EUC Planet</title>
    <link rel="icon" href="static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.css" />
    <link rel="stylesheet" href="static/css/inspector.css?v=21" />
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "x1vx2i22n8");
    </script>
</head>
<body>
    <div id="inspector">
        <header id="dash">
            <div class="trip-title">
                <div id="trip-name">&mdash;</div>
                <div id="trip-subtitle"></div>
            </div>

            <div class="gauge gauge-speed">
                <svg viewBox="0 0 120 70" class="gauge-svg">
                    <path class="gauge-track" d="M10 60 A 50 50 0 0 1 110 60" />
                    <path class="gauge-fill"  d="M10 60 A 50 50 0 0 1 110 60" id="speedo-fill" />
                    <line id="speedo-needle" x1="60" y1="60" x2="60" y2="18" />
                    <circle cx="60" cy="60" r="4" class="gauge-hub" />
                </svg>
                <div class="gauge-value"><span id="speedo-value">0</span></div>
                <div class="gauge-label">Speed</div>
            </div>

            <div class="gauge gauge-battery">
                <div class="battery-shell">
                    <div class="battery-fill" id="battery-fill"></div>
                    <div class="battery-text" id="battery-value">&mdash;</div>
                </div>
                <div class="gauge-label">Battery</div>
            </div>

            <div class="gauge gauge-gforce hidden" id="gforce-gauge" title="Instantaneous G-Force (lateral / longitudinal)">
                <canvas id="gforce-canvas" class="gforce-canvas"></canvas>
                <div class="gforce-info">
                    <div class="gauge-label">G-Force</div>
                    <div class="gforce-num"><span id="gforce-value">0.00</span><small>g</small></div>
                </div>
            </div>

            <div class="readout">
                <div class="readout-label">Distance</div>
                <div class="readout-value"><span id="odo-value">0.00</span><small class="unit-dist">km</small></div>
            </div>

            <div class="readout">
                <div class="readout-label">Voltage</div>
                <div class="readout-value"><span id="volt-value">&mdash;</span><small>V</small></div>
            </div>

            <div class="readout">
                <div class="readout-label">Temp</div>
                <div class="readout-value"><span id="temp-value">&mdash;</span><small class="unit-temp">&deg;C</small></div>
            </div>

            <div class="readout">
                <div class="readout-label">Altitude</div>
                <div class="readout-value"><span id="alt-value">&mdash;</span><small class="unit-alt">m</small></div>
            </div>

            <div class="readout clock">
                <div class="readout-label">Time</div>
                <div class="readout-value mono"><span id="clock-value">00:00:00</span></div>
                <div class="readout-sub mono">/ <span id="clock-total">00:00:00</span></div>
            </div>
        </header>

        <main id="stage">
            <div id="map">
                <div id="map-controls" class="hidden collapsed">
                    <button type="button" id="map-controls-toggle" title="Map settings" aria-label="Map settings">
                        <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
                    </button>
                    <div class="map-controls-body">
                        <label>
                            <span>Map style</span>
                            <select id="theme-select">
                                <option value="dark">Dark</option>
                                <option value="light">Light</option>
                                <option value="satellite" selected>Satellite</option>
                            </select>
                        </label>
                        <label>
                            <span>Trace color</span>
                            <select id="color-select">
                                <option value="solid">Solid</option>
                                <option value="speed" selected>Speed</option>
                                <option value="gpsspeed">GPS speed</option>
                                <option value="pwm">PWM</option>
                                <option value="power">Power</option>
                                <option value="current">Current</option>
                                <option value="battery">Battery</option>
                                <option value="voltage">Voltage</option>
                                <option value="temp">Temp</option>
                                <option value="altitude">Altitude</option>
                            </select>
                        </label>
                        <label>
                            <span>Trace style</span>
                            <select id="trace-style-select" title="How track lines are drawn. Follows the map style automatically until you pick one.">
                                <option value="normal">Normal</option>
                                <option value="neon">Neon</option>
                                <option value="dark">Dark</option>
                            </select>
                        </label>
                        <label>
                            <span>Trace mode</span>
                            <select id="trace-mode-select">
                                <option value="trail-fixed" selected>Trail</option>
                                <option value="trail-dynamic">Trail dynamic</option>
                                <option value="whole">Whole route</option>
                            </select>
                        </label>
                        <div class="follow-group">
                            <span class="follow-label">Follow</span>
                            <label class="follow-row">
                                <input type="checkbox" id="follow-pan" checked />
                                <span>Pan</span>
                            </label>
                            <label class="follow-row">
                                <input type="checkbox" id="follow-rotate" checked />
                                <span>Rot</span>
                            </label>
                            <label class="follow-row">
                                <input type="checkbox" id="follow-zoom" checked />
                                <span>Zoom</span>
                            </label>
                        </div>
                        <div id="color-legend" class="hidden">
                            <div class="legend-bar"></div>
                            <div class="legend-scale">
                                <span data-legend-min>&mdash;</span>
                                <span data-legend-max>&mdash;</span>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <aside id="charts">
                <!-- Each block's header (label + min/value/max + collapse caret)
                     is built by inspector.js so the Speed block can grow its
                     triple-row GPS layout. -->
                <div class="chart-block" data-key="speed"><div class="chart-body"><canvas></canvas></div></div>
                <div class="chart-block" data-key="pwm"><div class="chart-body"><canvas></canvas></div></div>
                <div class="chart-block" data-key="power"><div class="chart-body"><canvas></canvas></div></div>
                <div class="chart-block" data-key="current"><div class="chart-body"><canvas></canvas></div></div>
                <div class="chart-block" data-key="battery"><div class="chart-body"><canvas></canvas></div></div>
                <div class="chart-block" data-key="voltage"><div class="chart-body"><canvas></canvas></div></div>
                <div class="chart-block" data-key="temp"><div class="chart-body"><canvas></canvas></div></div>
                <div class="chart-block" data-key="altitude"><div class="chart-body"><canvas></canvas></div></div>
                <div id="sidebar-resize" title="Drag to resize charts"></div>
            </aside>
        </main>

        <footer id="playback">
            <button id="play-btn" title="Play / Pause. Hold to restart from the beginning of the section.">&#9654;</button>
            <div class="ab-group">
                <button type="button" id="loop-btn" class="ab-btn ab-loop-btn" title="Loop the selected section">&#x21bb;</button>
            </div>
            <div class="scrub-wrap">
                <div id="scrub-ab-fill" class="scrub-ab-fill hidden"></div>
                <div id="zoom-handle-a" class="zoom-handle hidden" title="Drag to refine section start"></div>
                <div id="zoom-handle-b" class="zoom-handle hidden" title="Drag to refine section end"></div>
                <input id="scrub" type="range" min="0" max="1000" step="1" value="0" />
                <div id="zoom-indicator" class="zoom-indicator hidden" title="Click to reset zoom">
                    <span id="zoom-range">0:00 → 0:00</span>
                </div>
            </div>
            <div class="speed-group">
                <label>Speed</label>
                <select id="speed-select">
                    <option value="0.25">&frac14;&times;</option>
                    <option value="0.5">&frac12;&times;</option>
                    <option value="1">1&times;</option>
                    <option value="4">4&times;</option>
                    <option value="8">8&times;</option>
                    <option value="16">16&times;</option>
                    <option value="32">32&times;</option>
                    <option value="64">64&times;</option>
                    <option value="128">128&times;</option>
                    <option value="256">256&times;</option>
                    <option value="512">512&times;</option>
                </select>
            </div>
        </footer>

        <div id="error-banner" class="hidden"></div>
    </div>

    <script src="https://unpkg.com/maplibre-gl@4.7.1/dist/maplibre-gl.js"></script>
    <script src="static/js/inspector.js?v=55"></script>
</body>
</html>
