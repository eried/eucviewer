<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EUC Planet Trip Viewer</title>
    <link rel="icon" href="static/favicon.svg" type="image/svg+xml" />
    <link rel="stylesheet" href="https://unpkg.com/leaflet@1.9.4/dist/leaflet.css" />
    <link rel="stylesheet" href="static/css/style.css?v=47" />
    <script type="text/javascript">
        (function(c,l,a,r,i,t,y){
            c[a]=c[a]||function(){(c[a].q=c[a].q||[]).push(arguments)};
            t=l.createElement(r);t.async=1;t.src="https://www.clarity.ms/tag/"+i;
            y=l.getElementsByTagName(r)[0];y.parentNode.insertBefore(t,y);
        })(window, document, "clarity", "script", "x1vx2i22n8");
    </script>
</head>
<body>
    <div id="map"></div>

    <div id="map-controls" class="hidden collapsed">
        <button type="button" id="map-controls-toggle" title="Map settings" aria-label="Map settings">
            <svg viewBox="0 0 24 24" width="18" height="18" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 1 1-2.83 2.83l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-4 0v-.09a1.65 1.65 0 0 0-1-1.51 1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 1 1-2.83-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1 0-4h.09a1.65 1.65 0 0 0 1.51-1 1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 1 1 2.83-2.83l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 4 0v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 1 1 2.83 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 0 4h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>
        </button>
        <div class="map-controls-body">
            <label>
                <span>Units</span>
                <div class="units-toggle" role="radiogroup" aria-label="Units">
                    <button type="button" class="units-btn" data-units="metric" role="radio">Metric</button>
                    <button type="button" class="units-btn" data-units="imperial" role="radio">Imperial</button>
                </div>
            </label>
            <label>
                <span>Map style</span>
                <select id="map-style-select">
                    <option value="standard" selected>Standard</option>
                    <option value="dark">Dark</option>
                    <option value="satellite">Satellite</option>
                    <option value="topo">Topo</option>
                </select>
            </label>
            <label>
                <span>Trace color</span>
                <select id="trace-color-select">
                    <option value="solid" selected>Solid</option>
                    <option value="speed">Speed</option>
                    <option value="gpsspeed">GPS speed</option>
                    <option value="pwm">PWM</option>
                    <option value="power">Power</option>
                    <option value="current">Current</option>
                    <option value="battery">Battery</option>
                    <option value="voltage">Voltage</option>
                    <option value="temp">Temp</option>
                    <option value="altitude">Altitude</option>
                    <option value="distance">Distance</option>
                </select>
            </label>
            <div id="color-legend" class="hidden">
                <div class="legend-bar"></div>
                <div class="legend-scale">
                    <span data-legend-min>&mdash;</span>
                    <span data-legend-max>&mdash;</span>
                </div>
            </div>
        </div>
    </div>

    <div id="upload-overlay">
        <div id="upload-box">
            <img id="upload-icon" src="static/favicon.svg" alt="" />
            <h1><a id="app-link" href="https://eucplanet.ried.no/" target="_blank" rel="noopener"><strong>EUC Planet</strong></a> Trip Viewer</h1>
            <div id="upload-hint">
                <p>In EUC Planet, open <strong>Trips</strong> and share a ride, pick <strong>Export all</strong> from the top-right menu, or enable <strong>Online backup to Dropbox</strong> under <em>Backups &amp; leaderboards</em>.</p>
                <p class="upload-hint-aside">Exports from <a href="#" class="hint-source" data-source="darknessbot">DarknessBot</a> or <a href="#" class="hint-source" data-source="eucworld">euc.world</a> also work, or load from <a href="#" class="hint-source" data-source="dropbox" data-dropbox-modal="1">Dropbox</a>.</p>
            </div>
            <div id="upload-actions">
                <label id="upload-label" for="file-input">
                    Upload trips
                    <input type="file" id="file-input" accept=".dbb,.csv,.gpx,.xlsx" />
                </label>
                <div id="dropbox-split" class="dropbox-split">
                    <button type="button" id="dropbox-btn" class="hint-source dropbox-main" data-source="dropbox" title="Load trips from Dropbox">
                        <svg viewBox="0 0 24 24" width="18" height="18" aria-hidden="true">
                            <path fill="currentColor" d="M6 2 0 6l6 4 6-4-6-4zm12 0-6 4 6 4 6-4-6-4zM0 14l6 4 6-4-6-4-6 4zm18-4-6 4 6 4 6-4-6-4zM6 19l6 4 6-4-6-4-6 4z"/>
                        </svg>
                        <span>Dropbox</span>
                    </button>
                    <button type="button" id="dropbox-menu-btn" class="hint-source dropbox-menu" data-source="dropbox" data-dropbox-modal="1" title="Open Dropbox dialog" aria-label="Open Dropbox dialog">
                        <svg viewBox="0 0 16 16" width="10" height="10" aria-hidden="true"><path fill="currentColor" d="M3 5l5 6 5-6z"/></svg>
                    </button>
                </div>
            </div>
            <div id="source-instructions" class="hidden"></div>
            <div id="progress-area" class="hidden">
                <div id="progress-bar"><div id="progress-fill"></div></div>
                <div id="progress-text"></div>
            </div>
        </div>
    </div>

    <div id="trip-panel" class="hidden">
        <div id="panel-tab"><span id="panel-tab-text">Trip Explorer</span></div>
        <div id="panel-body">
            <div id="panel-header"></div>
            <div id="trip-detail" class="hidden"></div>
            <div id="trip-list"></div>
            <div id="panel-footer"></div>
        </div>
    </div>

    <div id="page-footer">
        <a href="https://github.com/eried/eucviewer" target="_blank" rel="noopener" title="View / contribute on GitHub">
            <svg viewBox="0 0 16 16" width="14" height="14" aria-hidden="true">
                <path fill="currentColor" d="M8 0C3.58 0 0 3.58 0 8c0 3.54 2.29 6.53 5.47 7.59.4.07.55-.17.55-.38 0-.19-.01-.82-.01-1.49-2.01.37-2.53-.49-2.69-.94-.09-.23-.48-.94-.82-1.13-.28-.15-.68-.52-.01-.53.63-.01 1.08.58 1.23.82.72 1.21 1.87.87 2.33.66.07-.52.28-.87.51-1.07-1.78-.2-3.64-.89-3.64-3.95 0-.87.31-1.59.82-2.15-.08-.2-.36-1.02.08-2.12 0 0 .67-.21 2.2.82.64-.18 1.32-.27 2-.27.68 0 1.36.09 2 .27 1.53-1.04 2.2-.82 2.2-.82.44 1.1.16 1.92.08 2.12.51.56.82 1.27.82 2.15 0 3.07-1.87 3.75-3.65 3.95.29.25.54.73.54 1.48 0 1.07-.01 1.93-.01 2.2 0 .21.15.46.55.38A8.013 8.013 0 0016 8c0-4.42-3.58-8-8-8z"/>
            </svg>
            <span>GitHub</span>
        </a>
        <span id="page-version" title="HTML last-modified date (auto-updated on deploy)"></span>
    </div>
    <script>
        (function(){
            var d = new Date(document.lastModified);
            var iso = isNaN(d.getTime())
                ? document.lastModified
                : d.toISOString().slice(0, 16).replace('T', ' ');
            document.getElementById('page-version').textContent = 'build ' + iso;
        })();
    </script>

    <script src="https://unpkg.com/leaflet@1.9.4/dist/leaflet.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <script src="static/js/app.js?v=68"></script>
    <script src="static/js/dropbox-source.js?v=4"></script>
    <script src="static/js/source-hints.js?v=29"></script>
</body>
</html>
